version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-access-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: easy_access
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/web/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
